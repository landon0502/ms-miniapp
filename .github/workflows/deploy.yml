name: Deploy Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Cache admin dependencies
        uses: actions/cache@v3
        with:
          path: admin/node_modules
          key: ${{ runner.os }}-admin-${{ hashFiles('admin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-admin-

      - name: Cache miniapp dependencies
        uses: actions/cache@v3
        with:
          path: miniapp/node_modules
          key: ${{ runner.os }}-miniapp-${{ hashFiles('miniapp/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-miniapp-

      - name: Install dependencies for admin
        run: |
          cd admin
          npm install

      - name: Build admin
        run: |
          cd admin
          npm run build

      - name: Install dependencies for miniapp
        run: |
          cd miniapp
          npm install

      - name: Build miniapp (WAP)
        run: |
          cd miniapp
          npm run build:wap

      - name: Run tests (if available)
        run: |
          cd miniapp
          npm test || echo "No tests found or tests failed"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: |
            admin/node_modules
            miniapp/node_modules
          key: ${{ runner.os }}-all-${{ hashFiles('admin/package-lock.json', 'miniapp/package-lock.json') }}

      - name: Rebuild projects
        run: |
          cd admin && npm run build
          cd ../miniapp && npm run build:wap

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Deploy to production
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # 安装 SSH 客户端
          sudo apt-get update && sudo apt-get install -y openssh-client
          
          # 创建 SSH 目录
          mkdir -p ~/.ssh
          
          # 写入私钥
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 配置 SSH
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          
          # 压缩构建文件
          tar -czf build.tar.gz admin/dist miniapp/dist nginx docker-compose.yml
          
          # 上传文件到服务器
          scp build.tar.gz "$SERVER_USER@$SERVER_HOST:/tmp/"
          
          # 在服务器上部署
          ssh "$SERVER_USER@$SERVER_HOST" << 'EOF'
            # 停止旧服务
            docker-compose down || true
            
            # 创建部署目录
            mkdir -p /opt/duty-free-shopping
            cd /opt/duty-free-shopping
            
            # 解压文件
            tar -xzf /tmp/build.tar.gz
            
            # 启动新服务
            docker-compose up -d
            
            # 清理临时文件
            rm /tmp/build.tar.gz
            
            # 验证服务状态
            sleep 15
            docker-compose ps
            
            # 健康检查
            curl -f http://localhost:3000 || echo "Backend service might not be ready yet"
            curl -f http://localhost/admin || echo "Admin service might not be ready yet"
            curl -f http://localhost/wap || echo "WAP service might not be ready yet"
          EOF

      - name: Notify deployment status
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Admin: http://${{ secrets.SERVER_HOST }}/admin"
          echo "WAP: http://${{ secrets.SERVER_HOST }}/wap"
          echo "API: http://${{ secrets.SERVER_HOST }}:3000"
          echo "API Docs: http://${{ secrets.SERVER_HOST }}:8080/api-docs"