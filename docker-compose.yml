version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./admin/dist:/usr/share/nginx/html/admin:ro
      - ./miniapp/dist:/usr/share/nginx/html/wap:ro

  backend:
    image: node:latest
    restart: always
    environment:
      - MYSQL_PORT=3306
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=00000000
      - MYSQL_DATABASE=duty_free_shopping
    volumes:
      - ./backend:/app
    working_dir: /app
    command: npm start

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=00000000
      - MYSQL_DATABASE=duty_free_shopping
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
